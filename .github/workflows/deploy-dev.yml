name: Deploy Dev
on:
  push:
    branches: [develop]
permissions:
  id-token: write
  contents: read
concurrency:
  group: deploy-dev
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -r backend/requirements.txt
      - run: cd backend && PYTHONPATH=src pytest -q tests/unit
      - run: cd backend && sam build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-oidc-deploy-dev
          aws-region: us-east-1
      - run: cd backend && sam deploy --config-env default --parameter-overrides EnvironmentName=dev OpenAISecretArn=replace-me
      - run: cd frontend && npm ci && npm run build
      - run: echo "Trigger Amplify deployment from GitHub Actions or the Amplify console"
