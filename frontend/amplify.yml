# Internal frontend build configuration.
# The repository root also includes amplify.yml for AWS Amplify build settings.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm run lint
        - npm run test
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: no-cache
